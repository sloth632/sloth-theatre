<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLOTH theatre</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#0f1115; color:#fff; }
header { background: rgba(10,20,40,0.8); padding:20px; text-align:center; font-size:2rem; font-weight:bold; cursor:pointer; backdrop-filter: blur(10px); color:#00bfff; transition: 0.3s; }
header:hover { color:#00e0ff; }
#ad-warning { text-align:center; background: #ff4c4c; color:#fff; padding:6px 0; font-size:14px; font-weight:bold; }
#controls { display:flex; justify-content:center; align-items:center; gap:10px; padding:20px; flex-wrap:wrap; }
#search-input { width:300px; padding:10px; border-radius:12px; border:none; outline:none; font-size:16px; background: rgba(0,191,255,0.1); color:#fff; backdrop-filter: blur(5px); }
#search-btn { padding:10px 15px; border:none; border-radius:12px; background: rgba(0,191,255,0.3); cursor:pointer; color:#fff; font-weight:bold; transition:0.2s; }
#search-btn:hover { background: rgba(0,191,255,0.6); }
#results, #rec-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:15px; padding:20px; }
.card { background: rgba(20,30,50,0.7); border-radius:12px; overflow:hidden; cursor:pointer; transition: transform 0.2s, box-shadow 0.3s; backdrop-filter: blur(5px); }
.card:hover { transform: translateY(-5px); box-shadow: 0 5px 20px rgba(0,191,255,0.5); }
.card img { width:100%; display:block; border-bottom: 1px solid rgba(255,255,255,0.1); }
.card .info { padding:10px; }
.card .info h3 { margin:5px 0; font-size:16px; }
.card .info p { margin:0; font-size:14px; color:#ccc; }
#loader { display:none; border:6px solid rgba(0,191,255,0.2); border-top:6px solid #00bfff; border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite; margin:40px auto; }
@keyframes spin{ 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
#player-page{ position:fixed; top:0; left:0; width:100%; height:100%; background:#0f1115; z-index:999; display:none; flex-direction:column; overflow-y:auto; }
#player-topbar{ display:flex; align-items:center; gap:15px; padding:15px; background:#111827; flex-wrap:wrap; }
#back-btn{ background:#00bfff; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; color:white; }
#server-buttons{ display:flex; gap:10px; }
.server-btn{ background: rgba(0,191,255,0.3); border:none; padding:6px 12px; border-radius:8px; cursor:pointer; color:white; transition:0.2s; }
.server-btn.active, .server-btn:hover{ background: rgba(0,191,255,0.6); }
#player-wrapper{ display:flex; justify-content:center; margin:15px 0; }
#player{ width:90%; max-width:800px; height:450px; border:none; border-radius:12px; }
#player-info{ display:flex; flex-direction:column; align-items:center; padding:15px; max-width:900px; margin:0 auto; }
#player-info img{ width:200px; border-radius:12px; margin-bottom:10px; }
#player-info h2{ margin:5px 0; text-align:center; }
#player-info p{ color:#ccc; text-align:center; max-width:600px; }
#recommendations{ width:100%; max-width:900px; margin-top:20px; }
#rec-grid{ max-height:600px; overflow-y:auto; }
@media(max-width:600px){ #search-input{width:70%;} #player{height:250px;} #player-info img{width:120px;} #player-info p{max-width:90%;} }
</style>
</head>
<body>
<div id="ad-warning">USE AD BLOCKER FOR BEST EXPERIENCE</div>
<header id="home-btn">SLOTH theatre</header>
<div id="controls">
  <input type="text" id="search-input" placeholder="Search Movies / TV Shows / Anime">
  <button id="search-btn">Search</button>
</div>
<div id="loader"></div>
<div id="results"></div>
<div id="player-page">
  <div id="player-topbar">
    <button id="back-btn">Back</button>
    <span id="player-title"></span>
    <div id="server-buttons">
      <button id="server1-btn" class="server-btn active">Server 1</button>
      <button id="server2-btn" class="server-btn">Server 2</button>
    </div>
  </div>
  <div id="player-wrapper">
    <iframe id="player" allowfullscreen></iframe>
  </div>
  <div id="player-info">
    <img id="player-cover" src="" alt="Cover">
    <h2 id="player-name"></h2>
    <p id="player-overview"></p>
  </div>
  <div id="recommendations">
    <h3>Recommendations</h3>
    <div id="rec-grid"></div>
  </div>
</div>
<script>
const API_KEY="35f7935f6eef2c34022928212260b128";
let currentType='movie';
let currentItemId=null;
let currentServer='server1';
const searchInput=document.getElementById('search-input');
const searchBtn=document.getElementById('search-btn');
const homeBtn=document.getElementById('home-btn');
const resultsDiv=document.getElementById('results');
const loader=document.getElementById('loader');
const playerPage=document.getElementById('player-page');
const playerIframe=document.getElementById('player');
const backBtn=document.getElementById('back-btn');
const playerTitle=document.getElementById('player-title');
const server1Btn=document.getElementById('server1-btn');
const server2Btn=document.getElementById('server2-btn');
const playerCover=document.getElementById('player-cover');
const playerName=document.getElementById('player-name');
const playerOverview=document.getElementById('player-overview');
const recGrid=document.getElementById('rec-grid');
searchBtn.addEventListener('click', ()=>{ const query=searchInput.value.trim(); if(query===''){ fetchTrending(); }else{ searchAll(query); } });
searchInput.addEventListener('keypress', e=>{ if(e.key==='Enter'){ const query=searchInput.value.trim(); if(query===''){ fetchTrending(); }else{ searchAll(query); } }});
homeBtn.addEventListener('click', fetchTrending);
backBtn.addEventListener('click', ()=>{ playerPage.style.display='none'; playerIframe.src=""; recGrid.innerHTML=''; document.getElementById('controls').style.display='flex'; resultsDiv.style.display='grid'; });
server1Btn.addEventListener('click', ()=>{ currentServer='server1'; updatePlayer(); server1Btn.classList.add('active'); server2Btn.classList.remove('active'); });
server2Btn.addEventListener('click', ()=>{ currentServer='server2'; updatePlayer(); server2Btn.classList.add('active'); server1Btn.classList.remove('active'); });
async function searchAll(query){
    loader.style.display='block'; resultsDiv.innerHTML=''; playerPage.style.display='none';
    try{
        const [movies,tv]=await Promise.all([
            fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`),
            fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${encodeURIComponent(query)}`)
        ]);
        const movieData=await movies.json();
        const tvData=await tv.json();
        loader.style.display='none';
        displayResults([...movieData.results.map(r=>({...r,type:'movie'})),...tvData.results.map(r=>({...r,type:'tv'}))]);
    }catch(err){console.error(err);loader.style.display='none';resultsDiv.innerHTML='<p style="text-align:center;">Error fetching results.</p>';}
}
async function fetchTrending(){
    loader.style.display='block'; resultsDiv.innerHTML=''; playerPage.style.display='none';
    try{
        const [movies,tv]=await Promise.all([
            fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`),
            fetch(`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}`)
        ]);
        const movieData=await movies.json();
        const tvData=await tv.json();
        loader.style.display='none';
        displayResults([...movieData.results.map(r=>({...r,type:'movie'})),...tvData.results.map(r=>({...r,type:'tv'}))]);
    }catch(err){console.error(err);loader.style.display='none';resultsDiv.innerHTML='<p style="text-align:center;">Error fetching trending movies and tv series</p>';}
}
function displayResults(items){
    resultsDiv.innerHTML='';
    items.forEach(item=>{
        const card=document.createElement('div');
        card.className='card';
        card.innerHTML=`<img src="https://image.tmdb.org/t/p/w300${item.poster_path}" alt="${item.title||item.name}"><div class="info"><h3>${item.title||item.name}</h3><p>${item.type.toUpperCase()}</p></div>`;
        card.addEventListener('click',()=>loadPlayer(item.id,item.type,item.title||item.name));
        resultsDiv.appendChild(card);
    });
}
async function loadPlayer(id,type,title){
    currentItemId=id;
    currentType=type;
    currentServer='server1';
    server1Btn.classList.add('active');
    server2Btn.classList.remove('active');
    playerTitle.textContent=title;
    playerPage.style.display='flex';
    document.getElementById('controls').style.display='none';
    resultsDiv.style.display='none';
    try {
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=en-US`);
        const data = await res.json();
        playerCover.src = "https://image.tmdb.org/t/p/w300" + data.poster_path;
        playerName.textContent = data.title || data.name;
        playerOverview.textContent = data.overview || "No overview available.";
        const recRes = await fetch(`https://api.themoviedb.org/3/${type}/${id}/recommendations?api_key=${API_KEY}&language=en-US`);
        const recData = await recRes.json();
        recGrid.innerHTML='';
        recData.results.slice(0,20).forEach(rec=>{
            const card=document.createElement('div');
            card.className='card';
            card.innerHTML=`<img src="https://image.tmdb.org/t/p/w300${rec.poster_path}" alt="${rec.title||rec.name}"><div class="info"><h3>${rec.title||rec.name}</h3><p>${type.toUpperCase()}</p></div>`;
            card.addEventListener('click',()=>loadPlayer(rec.id,type,rec.title||rec.name));
            recGrid.appendChild(card);
        });
    } catch(err){console.error(err);}
    updatePlayer();
}
function updatePlayer(){
    if(currentServer==='server1'){
        if(currentType==='movie'){ playerIframe.src=`https://vsembed.ru/embed/movie?tmdb=${currentItemId}`; } 
        else { playerIframe.src=`https://vsembed.ru/embed/tv?tmdb=${currentItemId}`; }
    } else {
        if(currentType==='movie'){ playerIframe.src=`https://vidsrc.ru/movie/${currentItemId}?colour=0095ff&autoplay=false&autonextepisode=true`; } 
        else { playerIframe.src=`https://vidsrc.ru/tv/${currentItemId}/1/1?colour=0095ff&autoplay=false&autonextepisode=true`; }
    }
}
fetchTrending();
</script>
</body>
</html>
