<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLOTH theatre</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1115;
color:white;
}

header{
background:#111827;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
cursor:pointer;
color:#00bfff;
}

#controls{
display:flex;
justify-content:center;
gap:10px;
padding:20px;
}

#search-input{
padding:10px;
width:300px;
border-radius:10px;
border:none;
outline:none;
background:#1f2937;
color:white;
}

#search-btn{
padding:10px 15px;
border:none;
border-radius:10px;
background:#00bfff;
cursor:pointer;
}

#results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1f2937;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
}

.card .info{
padding:10px;
}

#loader{
display:none;
margin:auto;
border:6px solid #222;
border-top:6px solid #00bfff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#player-page{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f1115;
display:none;
flex-direction:column;
}

#player-topbar{
padding:10px;
background:#111827;
display:flex;
gap:10px;
}

#player{
width:100%;
height:80%;
border:none;
}

select{
padding:6px;
border-radius:6px;
}

</style>
</head>

<body>

<header id="home-btn">SLOTH theatre</header>

<div id="controls">
<input id="search-input" placeholder="Search movies / shows">
<button id="search-btn">Search</button>
</div>

<div id="loader"></div>
<div id="results"></div>

<div id="player-page">

<div id="player-topbar">
<button id="back-btn">Back</button>
<span id="player-title"></span>
</div>

<iframe id="player" allowfullscreen></iframe>

<div style="padding:10px">

<select id="season-select"></select>
<select id="episode-select"></select>

</div>

</div>

<script>

const BACKEND_URL="https://sloth-backend.tebin-kurdish-dev.workers.dev/"

let currentType
let currentId

const results=document.getElementById("results")
const loader=document.getElementById("loader")

const playerPage=document.getElementById("player-page")
const player=document.getElementById("player")

const seasonSelect=document.getElementById("season-select")
const episodeSelect=document.getElementById("episode-select")

async function fetchTrending(){

loader.style.display="block"

const r=await fetch(`${BACKEND_URL}/api/trending`)
const data=await r.json()

loader.style.display="none"

displayResults(data)

}

async function searchAll(query){

loader.style.display="block"

const r=await fetch(`${BACKEND_URL}/api/search?q=${query}`)
const data=await r.json()

loader.style.display="none"

displayResults(data)

}

function displayResults(items){

results.innerHTML=""

items.forEach(item=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="https://image.tmdb.org/t/p/w300${item.poster_path}">
<div class="info">
<h3>${item.title||item.name}</h3>
<p>${item.type.toUpperCase()} | ⭐ ${item.vote_average}</p>
</div>
`

card.onclick=()=>loadPlayer(item)

results.appendChild(card)

})

}

async function loadPlayer(item){

currentType=item.type
currentId=item.id

document.getElementById("player-title").textContent=item.title||item.name

playerPage.style.display="flex"

if(item.type==="movie"){

player.src=`https://vidsrc.cc/v3/embed/movie/${item.id}`

seasonSelect.style.display="none"
episodeSelect.style.display="none"

}else{

seasonSelect.style.display="inline"
episodeSelect.style.display="inline"

const r=await fetch(`${BACKEND_URL}/api/tv/${item.id}`)
const data=await r.json()

seasonSelect.innerHTML=""

for(let i=1;i<=data.number_of_seasons;i++){

const o=document.createElement("option")
o.value=i
o.text=`Season ${i}`
seasonSelect.appendChild(o)

}

loadEpisodes(data)

}

}

function loadEpisodes(data){

const s=seasonSelect.value||1

episodeSelect.innerHTML=""

const total=data.seasons[s-1]?.episode_count||1

for(let i=1;i<=total;i++){

const o=document.createElement("option")
o.value=i
o.text=`Episode ${i}`

episodeSelect.appendChild(o)

}

updateTV()

}

function updateTV(){

const s=seasonSelect.value
const e=episodeSelect.value

player.src=`https://vidsrc.cc/v3/embed/tv/${currentId}/${s}/${e}`

}

seasonSelect.onchange=async()=>{

const r=await fetch(`${BACKEND_URL}/api/tv/${currentId}`)
const data=await r.json()

loadEpisodes(data)

}

episodeSelect.onchange=updateTV

document.getElementById("search-btn").onclick=()=>{

const q=document.getElementById("search-input").value

if(q) searchAll(q)
else fetchTrending()

}

document.getElementById("search-input").addEventListener("keypress",e=>{

if(e.key==="Enter"){

const q=e.target.value

if(q) searchAll(q)
else fetchTrending()

}

})

document.getElementById("back-btn").onclick=()=>{

playerPage.style.display="none"
player.src=""

}

fetchTrending()

</script>

</body>
</html>
